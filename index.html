<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ Vocab 570 - Học Từ Vựng</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Quicksand',sans-serif;background:linear-gradient(135deg,#fff0f5 0%,#fffbec 50%,#fff5f9 100%);min-height:100vh;color:#4a3040}
:root{--pink:#ff8fab;--pink-light:#ffd6e7;--pink-deep:#e8547a;--yellow:#f9c74f;--yellow-light:#fff3cd;--yellow-deep:#d4a017;--green:#4caf82;--orange:#f4845f;--text:#4a3040;--text2:#8a6070;--border:#fcd5e5;--radius:14px;--shadow:0 2px 12px rgba(255,143,171,0.15)}
h1,h2,h3{font-weight:700}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.header{text-align:center;padding:2rem 1rem 1.2rem}
.header h1{font-size:2.2rem;background:linear-gradient(135deg,var(--pink-deep),var(--yellow-deep));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.3rem}
.header p{color:var(--text2);font-size:.95rem}
.stats-bar{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:.8rem 0}
.stat-pill{background:white;border:1.5px solid var(--border);border-radius:50px;padding:.4rem 1rem;font-size:.85rem;font-weight:600;color:var(--text2);display:flex;align-items:center;gap:6px}
.stat-pill span{color:var(--pink-deep)}
.tabs{display:flex;gap:5px;background:rgba(255,255,255,0.7);border-radius:50px;padding:5px;border:1.5px solid var(--border);margin-bottom:1.5rem;flex-wrap:wrap;justify-content:center}
.tab{padding:.5rem 1rem;border-radius:50px;border:none;background:transparent;cursor:pointer;font-family:'Quicksand',sans-serif;font-weight:600;font-size:.85rem;color:var(--text2);transition:.2s;white-space:nowrap}
.tab:hover{background:var(--pink-light);color:var(--pink-deep)}
.tab.active{background:linear-gradient(135deg,var(--pink),var(--yellow));color:white;box-shadow:0 2px 8px rgba(255,143,171,0.4)}
.controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:1.2rem}
.search-wrap{flex:1;min-width:200px;position:relative}
.search-wrap input{width:100%;padding:.7rem 1rem .7rem 2.5rem;border-radius:50px;border:1.5px solid var(--border);background:white;font-family:'Quicksand',sans-serif;font-size:.95rem;outline:none;transition:.2s}
.search-wrap input:focus{border-color:var(--pink);box-shadow:0 0 0 3px rgba(255,143,171,0.15)}
.search-icon{position:absolute;left:.8rem;top:50%;transform:translateY(-50%);font-size:1.1rem;color:var(--text2)}
select{padding:.7rem 1rem;border-radius:50px;border:1.5px solid var(--border);background:white;font-family:'Quicksand',sans-serif;font-size:.9rem;color:var(--text);outline:none;cursor:pointer}

/* VOCAB CARD */
.vocab-grid{display:grid;gap:10px}
.vocab-card{background:white;border-radius:var(--radius);border:1.5px solid var(--border);padding:1rem 1.2rem;transition:.2s}
.vocab-card:hover{border-color:var(--pink);box-shadow:var(--shadow);transform:translateY(-1px)}
.vocab-card.known{border-color:#c8f0dc;background:#f5fff9}
.vocab-card.known .word-en{color:var(--green)}
.vocab-card-header{display:flex;align-items:center;gap:10px;cursor:pointer}
.word-num{min-width:32px;height:32px;border-radius:50%;background:var(--pink-light);color:var(--pink-deep);font-weight:700;font-size:.8rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.word-main{flex:1}
.word-en{font-size:1.05rem;font-weight:700;color:var(--pink-deep);display:flex;align-items:center;gap:8px}
.word-vi{font-size:.92rem;color:var(--text);margin-top:.1rem}
.speak-btn{background:none;border:none;cursor:pointer;font-size:1.1rem;padding:2px 4px;border-radius:8px;transition:.15s;flex-shrink:0;line-height:1}
.speak-btn:hover{background:var(--pink-light);transform:scale(1.15)}
.speak-btn.speaking{animation:pulse .6s infinite alternate}
@keyframes pulse{from{opacity:.5}to{opacity:1}}
.group-badge{background:var(--pink-light);color:var(--pink-deep);border-radius:20px;padding:.15rem .6rem;font-size:.72rem;font-weight:700;white-space:nowrap;flex-shrink:0}
.known-btn{background:none;border:1.5px solid var(--border);border-radius:50px;padding:.28rem .75rem;font-size:.72rem;font-weight:700;cursor:pointer;font-family:'Quicksand',sans-serif;color:var(--text2);transition:.2s;flex-shrink:0}
.known-btn:hover{border-color:var(--green);color:var(--green)}
.known-btn.active{background:#e8faf2;border-color:var(--green);color:var(--green)}
.expand-btn{background:none;border:none;cursor:pointer;font-size:.9rem;color:var(--text2);padding:2px;transition:.2s;flex-shrink:0}

/* EXPANDED DETAIL */
.vocab-detail{display:none;margin-top:.8rem;padding-top:.8rem;border-top:1px dashed var(--border)}
.vocab-detail.open{display:block}
.family-section{margin-top:.5rem}
.family-label{font-size:.75rem;font-weight:700;color:var(--text2);margin-bottom:.3rem;text-transform:uppercase;letter-spacing:.5px}
.family-words{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:7px}
.family-tag{display:inline-flex;align-items:center;gap:6px;background:var(--yellow-light);color:var(--yellow-deep);border-radius:12px;padding:.35rem .75rem;font-size:.8rem;font-weight:600;border:1px solid #f9d87a;cursor:default;transition:.15s;flex-direction:column;align-items:flex-start;min-width:100px}
.family-tag-row{display:flex;align-items:center;gap:5px}
.family-tag-word{font-weight:700;color:var(--yellow-deep);font-size:.82rem}
.family-tag-meaning{font-size:.73rem;color:var(--text2);font-weight:500;margin-top:.1rem;font-style:italic;min-height:.9rem}
.family-tag .speak-mini{font-size:.82rem;opacity:.8;cursor:pointer;background:none;border:none;padding:0;line-height:1}

/* FLASHCARD */
.flashcard-wrap{display:flex;flex-direction:column;align-items:center;gap:1.5rem}
.fc-controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;width:100%}
.fc-progress{width:100%;max-width:600px;background:#ffe0ec;border-radius:50px;height:8px;overflow:hidden}
.fc-bar{height:100%;background:linear-gradient(90deg,var(--pink),var(--yellow));border-radius:50px;transition:.4s}
.fc-counter{font-size:.85rem;color:var(--text2);font-weight:600}
.flashcard{width:100%;max-width:600px;min-height:300px;perspective:1000px;cursor:pointer}
.fc-inner{width:100%;min-height:300px;position:relative;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,.2,.2,1)}
.fc-inner.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;width:100%;min-height:300px;border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;backface-visibility:hidden;-webkit-backface-visibility:hidden}
.fc-front{background:linear-gradient(135deg,#fff0f5,#fffbec);border:2px solid var(--border)}
.fc-back{background:linear-gradient(135deg,#f0fff6,#fff0f5);border:2px solid #c8f0dc;transform:rotateY(180deg)}
.fc-hint{font-size:.78rem;color:var(--text2);margin-bottom:.5rem;font-weight:600}
.fc-word{font-size:2rem;font-weight:700;color:var(--pink-deep);margin-bottom:.4rem;display:flex;align-items:center;gap:10px}
.fc-speak{background:var(--pink-light);border:none;border-radius:50%;width:36px;height:36px;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.2s}
.fc-speak:hover{transform:scale(1.12);background:var(--pink)}
.fc-group{font-size:.8rem;background:var(--pink-light);color:var(--pink-deep);border-radius:20px;padding:.2rem .8rem;font-weight:700}
.fc-meaning{font-size:1.35rem;font-weight:700;color:var(--green);margin-bottom:.5rem}
.fc-family-list{font-size:.82rem;color:var(--text2);line-height:1.9;max-width:400px}
.fc-nav{display:flex;gap:10px;justify-content:center}
.btn{padding:.6rem 1.4rem;border-radius:50px;border:none;font-family:'Quicksand',sans-serif;font-weight:700;font-size:.88rem;cursor:pointer;transition:.2s}
.btn-pink{background:linear-gradient(135deg,var(--pink),#ff6b9d);color:white;box-shadow:0 2px 8px rgba(255,143,171,0.35)}
.btn-pink:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(255,143,171,0.45)}
.btn-outline{background:white;border:1.5px solid var(--border);color:var(--text2)}
.btn-outline:hover{border-color:var(--pink);color:var(--pink-deep)}
.btn-green{background:linear-gradient(135deg,#4caf82,#2d9e6b);color:white}
.btn-yellow{background:linear-gradient(135deg,var(--yellow),#f4a324);color:white}
.btn-red{background:linear-gradient(135deg,#ff6b6b,#e74c3c);color:white}
.btn-blue{background:linear-gradient(135deg,#6bb5d6,#4a9dbf);color:white}
.btn-sm{padding:.38rem .9rem;font-size:.8rem}

/* QUIZ */
.quiz-wrap{max-width:700px;margin:0 auto}
.quiz-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;gap:10px}
.quiz-score-pill{background:var(--pink-light);color:var(--pink-deep);border-radius:50px;padding:.4rem 1rem;font-weight:700;font-size:.88rem;white-space:nowrap}
.quiz-q{background:white;border-radius:20px;border:2px solid var(--border);padding:1.5rem;margin-bottom:1rem;text-align:center}
.quiz-q .qlabel{font-size:.78rem;color:var(--text2);margin-bottom:.5rem;font-weight:600}
.quiz-q .question{font-size:1.45rem;font-weight:700;color:var(--pink-deep)}
.quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem}
.quiz-opt{background:white;border:1.5px solid var(--border);border-radius:var(--radius);padding:.9rem;font-family:'Quicksand',sans-serif;font-size:.92rem;font-weight:600;cursor:pointer;text-align:left;color:var(--text);transition:.2s}
.quiz-opt:hover:not(:disabled){border-color:var(--pink);background:var(--pink-light)}
.quiz-opt.correct{border-color:var(--green);background:#e8faf2;color:#1a7a4a}
.quiz-opt.wrong{border-color:#e74c3c;background:#fef0ef;color:#c0392b}
.quiz-opt:disabled{cursor:default}
.quiz-feedback{text-align:center;font-weight:700;font-size:1rem;margin:.5rem 0;min-height:1.4rem}
.quiz-feedback.correct{color:var(--green)}
.quiz-feedback.wrong{color:#e74c3c}
.quiz-finish{text-align:center;padding:2rem;background:white;border-radius:20px;border:2px solid var(--border)}
.quiz-big{font-size:3rem;font-weight:700;background:linear-gradient(135deg,var(--pink-deep),var(--yellow-deep));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.quiz-mode-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin:1rem 0}
.mode-card{background:white;border:1.5px solid var(--border);border-radius:var(--radius);padding:1.2rem;cursor:pointer;text-align:center;transition:.2s}
.mode-card:hover{border-color:var(--pink);box-shadow:var(--shadow);transform:translateY(-2px)}
.mode-card .icon{font-size:2rem;margin-bottom:.4rem}
.mode-card .title{font-weight:700;color:var(--pink-deep);margin-bottom:.2rem}
.mode-card .desc{font-size:.8rem;color:var(--text2)}

/* DICTATION GAME */
.dictation-wrap{max-width:650px;margin:0 auto}
.dict-word-display{background:white;border-radius:20px;border:2px solid var(--border);padding:2rem;text-align:center;margin-bottom:1rem}
.dict-hint{font-size:.8rem;color:var(--text2);margin-bottom:.5rem;font-weight:600}
.dict-blanks{font-size:1.8rem;font-weight:700;color:var(--pink-deep);letter-spacing:6px;font-family:monospace;margin-bottom:.5rem;word-break:break-all}
.dict-meaning{font-size:1rem;color:var(--text);margin-bottom:.3rem}
.dict-group{font-size:.8rem;background:var(--pink-light);color:var(--pink-deep);border-radius:20px;padding:.2rem .8rem;font-weight:700;display:inline-block}
.dict-input-row{display:flex;gap:10px;margin-bottom:1rem}
.dict-input{flex:1;padding:.8rem 1.2rem;border-radius:50px;border:2px solid var(--border);font-family:'Quicksand',sans-serif;font-size:1.1rem;font-weight:700;outline:none;text-align:center;letter-spacing:2px}
.dict-input:focus{border-color:var(--pink);box-shadow:0 0 0 3px rgba(255,143,171,0.15)}
.dict-input.correct-input{border-color:var(--green);background:#e8faf2}
.dict-input.wrong-input{border-color:#e74c3c;background:#fef0ef;animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.dict-feedback{text-align:center;min-height:1.4rem;font-weight:700;font-size:.95rem;margin-bottom:.5rem}
.dict-feedback.ok{color:var(--green)}
.dict-feedback.bad{color:#e74c3c}
.dict-score-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.hint-letters{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-top:.5rem}
.hint-letter{background:var(--pink-light);color:var(--pink-deep);border-radius:8px;padding:.2rem .5rem;font-size:.85rem;font-weight:700;font-family:monospace}

/* MATCH GAME */
.match-wrap{max-width:800px;margin:0 auto}
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:1rem 0}
.match-col{display:flex;flex-direction:column;gap:8px}
.match-card{background:white;border:1.5px solid var(--border);border-radius:var(--radius);padding:.8rem 1rem;cursor:pointer;font-weight:600;font-size:.9rem;transition:.2s;user-select:none;text-align:center}
.match-card:hover:not(.matched):not(.selected){border-color:var(--pink);background:var(--pink-light)}
.match-card.selected{border-color:var(--pink-deep);background:var(--pink-light);transform:scale(1.02)}
.match-card.matched{border-color:var(--green);background:#e8faf2;color:#1a7a4a;cursor:default;opacity:.7}
.match-card.wrong-flash{border-color:#e74c3c;background:#fef0ef;animation:flash .4s}
@keyframes flash{0%,100%{background:white}50%{background:#fef0ef}}
.match-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.match-timer{font-size:1.1rem;font-weight:700;color:var(--pink-deep)}
.match-score{background:var(--pink-light);color:var(--pink-deep);border-radius:50px;padding:.35rem .9rem;font-weight:700;font-size:.88rem}

/* SCOREBOARD */
.score-wrap{max-width:700px;margin:0 auto}
.score-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:1.5rem}
.score-card{background:white;border-radius:var(--radius);border:1.5px solid var(--border);padding:1.1rem;text-align:center}
.score-card .num{font-size:1.9rem;font-weight:700;color:var(--pink-deep)}
.score-card .lbl{font-size:.78rem;color:var(--text2);font-weight:600;margin-top:.2rem}
.score-card.green .num{color:var(--green)}
.score-card.yellow .num{color:var(--yellow-deep)}
.progress-ring-wrap{display:flex;flex-direction:column;align-items:center;margin:1rem 0 1.5rem}
.progress-label{font-size:.85rem;color:var(--text2);font-weight:600;margin-top:.5rem}
.score-groups{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:10px}
.score-group-card{background:white;border-radius:var(--radius);border:1.5px solid var(--border);padding:1rem;display:flex;flex-direction:column;gap:.4rem}
.sg-name{font-weight:700;font-size:.88rem;color:var(--text)}
.sg-bar-wrap{background:#f5e8ef;border-radius:50px;height:7px;overflow:hidden}
.sg-bar{height:100%;border-radius:50px;background:linear-gradient(90deg,var(--pink),var(--yellow));transition:.6s}
.sg-info{font-size:.78rem;color:var(--text2);font-weight:600}
.history-list{margin-top:1rem}
.history-item{display:flex;justify-content:space-between;align-items:center;padding:.55rem 1rem;border-radius:10px;margin-bottom:6px;background:white;border:1.5px solid var(--border);font-size:.83rem}
.history-item .ts{color:var(--text2);font-size:.72rem}
.empty{text-align:center;padding:3rem;color:var(--text2)}
.empty .eicon{font-size:3rem;margin-bottom:.5rem}

/* ADD VOCAB */
.addvocab-wrap{max-width:750px;margin:0 auto}
.add-tabs{display:flex;gap:8px;margin-bottom:1.2rem;flex-wrap:wrap}
.add-tab{padding:.5rem 1.2rem;border-radius:50px;border:1.5px solid var(--border);background:white;cursor:pointer;font-family:'Quicksand',sans-serif;font-weight:600;font-size:.88rem;color:var(--text2);transition:.2s}
.add-tab.active{background:var(--pink-deep);color:white;border-color:var(--pink-deep)}
.form-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:.8rem}
.form-group{display:flex;flex-direction:column;gap:.3rem;flex:1;min-width:160px}
.form-group label{font-size:.8rem;font-weight:700;color:var(--text2)}
.form-input{padding:.7rem 1rem;border-radius:var(--radius);border:1.5px solid var(--border);font-family:'Quicksand',sans-serif;font-size:.92rem;outline:none;transition:.2s;background:white}
.form-input:focus{border-color:var(--pink);box-shadow:0 0 0 3px rgba(255,143,171,0.12)}
.custom-list{margin-top:1rem;display:grid;gap:8px}
.custom-item{background:white;border:1.5px solid var(--border);border-radius:var(--radius);padding:.7rem 1rem;display:flex;align-items:center;gap:10px;font-size:.88rem}
.custom-item .ci-word{font-weight:700;color:var(--pink-deep);min-width:120px}
.custom-item .ci-vi{flex:1;color:var(--text)}
.custom-item .del-btn{background:none;border:none;cursor:pointer;font-size:1rem;color:#e74c3c;opacity:.6;padding:2px;transition:.15s}
.custom-item .del-btn:hover{opacity:1;transform:scale(1.1)}
.upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:2rem;text-align:center;cursor:pointer;transition:.2s;background:white}
.upload-zone:hover{border-color:var(--pink);background:var(--pink-light)}
.upload-zone .uz-icon{font-size:2.5rem;margin-bottom:.5rem}
.upload-zone .uz-text{font-weight:600;color:var(--text2)}
.upload-zone .uz-sub{font-size:.8rem;color:var(--text2);margin-top:.2rem}
.preview-table{width:100%;border-collapse:collapse;font-size:.85rem;margin-top:1rem}
.preview-table th{background:var(--pink-light);color:var(--pink-deep);padding:.5rem .8rem;font-weight:700;text-align:left;border-radius:0}
.preview-table td{padding:.45rem .8rem;border-bottom:1px solid var(--border)}
.preview-table tr:last-child td{border-bottom:none}
.preview-table tr:hover td{background:#fffbf5}

/* PAGINATION */
.pagination{display:flex;gap:6px;justify-content:center;margin-top:1rem;flex-wrap:wrap}
.page-btn{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--border);background:white;font-family:'Quicksand',sans-serif;font-weight:700;font-size:.82rem;cursor:pointer;color:var(--text2);transition:.2s;display:flex;align-items:center;justify-content:center}
.page-btn:hover{border-color:var(--pink);color:var(--pink-deep)}
.page-btn.active{background:linear-gradient(135deg,var(--pink),var(--yellow));color:white;border-color:transparent}
.page-info{font-size:.82rem;color:var(--text2);font-weight:600;padding:.4rem .6rem;display:flex;align-items:center}
.toast{position:fixed;bottom:2rem;right:2rem;background:white;border:1.5px solid var(--border);border-radius:50px;padding:.7rem 1.3rem;font-family:'Quicksand',sans-serif;font-weight:700;font-size:.88rem;box-shadow:0 4px 20px rgba(255,143,171,0.3);transform:translateY(100px);opacity:0;transition:.35s;z-index:999;color:var(--text)}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{border-color:var(--green);color:var(--green)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(74,48,64,0.35);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal-box{background:white;border-radius:20px;padding:1.5rem;max-width:480px;width:100%;max-height:80vh;overflow-y:auto;position:relative}
.modal-close{position:absolute;top:1rem;right:1rem;background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--text2)}
.modal-word{font-size:1.8rem;font-weight:700;color:var(--pink-deep);margin-bottom:.3rem;display:flex;align-items:center;gap:10px}
.modal-vi{font-size:1rem;color:var(--text);margin-bottom:.8rem}
.modal-group{font-size:.8rem;background:var(--pink-light);color:var(--pink-deep);border-radius:20px;padding:.2rem .8rem;font-weight:700;display:inline-block;margin-bottom:.8rem}
.modal-section-title{font-size:.8rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.4rem;margin-top:.8rem}
.modal-family-grid{display:flex;flex-wrap:wrap;gap:6px}
.modal-family-item{background:var(--yellow-light);border:1px solid #f9d87a;border-radius:20px;padding:.25rem .8rem;font-size:.82rem;font-weight:600;color:var(--yellow-deep);cursor:pointer;display:flex;align-items:center;gap:5px;transition:.15s}
.modal-family-item:hover{background:#fff0b0}

@media(max-width:600px){
  .quiz-options{grid-template-columns:1fr}
  .header h1{font-size:1.6rem}
  .fc-word{font-size:1.5rem}
  .match-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div class="app">

let state = {
  tab:'vocab', search:'', filterGroup:'all', filterStatus:'all', page:1,
  known: JSON.parse(localStorage.getItem('vocab_known')||'{}'),
  quizHistory: JSON.parse(localStorage.getItem('vocab_quiz_history')||'[]'),
  fcIndex:0, fcFlipped:false, fcDeck:[],
  quizState:null, quizAnswered:false, quizSelected:null,
  gameMode:null,
  expandedWords:{},
  addSubTab:'manual',
  dictState:null,
  matchState:null,
};

const PER_PAGE=20;
function save(){localStorage.setItem('vocab_known',JSON.stringify(state.known));localStorage.setItem('vocab_quiz_history',JSON.stringify(state.quizHistory));localStorage.setItem('custom_vocab',JSON.stringify(customVocab));}
function shuffle(a){return [...a].sort(()=>Math.random()-.5)}

function speak(word,e){
  if(e){e.stopPropagation();e.preventDefault();}
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(word);
  u.lang='en-US';u.rate=0.85;u.pitch=1;
  window.speechSynthesis.speak(u);
}

function getFiltered(){
  let v=VOCAB_ALL();
  if(state.search){const q=state.search.toLowerCase();v=v.filter(x=>x.w.toLowerCase().includes(q)||x.v.toLowerCase().includes(q)||(x.f||'').toLowerCase().includes(q));}
  if(state.filterGroup!=='all')v=v.filter(x=>x.g===state.filterGroup);
  if(state.filterStatus==='known')v=v.filter(x=>state.known[x.w]);
  if(state.filterStatus==='unknown')v=v.filter(x=>!state.known[x.w]);
  return v;
}

function toast(msg,success=false){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast show'+(success?' success':'');
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.className='toast',2200);
}

function updateStats(){
  const va=VOCAB_ALL();
  const known=Object.values(state.known).filter(Boolean).length;
  const pct=Math.round(known/va.length*100);
  document.getElementById('statsBar').innerHTML=`
    <div class="stat-pill">📚 <span>${va.length}</span> từ</div>
    <div class="stat-pill">✅ <span>${known}</span> đã thuộc</div>
    <div class="stat-pill">🎯 <span>${pct}%</span> tiến độ</div>
    <div class="stat-pill">📝 <span>${state.quizHistory.length}</span> quiz</div>
  `;
}

function openWordModal(word){
  const item=VOCAB_ALL().find(v=>v.w===word);
  if(!item)return;
  const families=item.f?item.f.split('|').map(s=>s.trim()).filter(Boolean):[];
  document.getElementById('modalArea').innerHTML=`
    <div class="modal-overlay" onclick="closeModal(event)">
      <div class="modal-box" onclick="event.stopPropagation()">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <div class="modal-word">
          ${item.w}
          <button class="fc-speak" onclick="speak('${item.w}',event)" title="Nghe phát âm">🔊</button>
        </div>
        <div class="modal-vi">${item.v}</div>
        <span class="modal-group">${item.g}</span>
        ${families.length?`
          <div class="modal-section-title">📝 Gia đình từ</div>
          <div class="modal-family-grid">
            ${families.map(f=>`
              <div class="modal-family-item" onclick="speak('${f.replace(/'/g,"\\'")}',event)">
                ${f} <span>🔊</span>
              </div>`).join('')}

        <div style="display:flex;gap:8px;margin-top:1.2rem;flex-wrap:wrap">
          <button class="btn btn-green btn-sm" onclick="markFromModal('${item.w}',true)">✅ Đã thuộc</button>

        </div>
      </div>

}
function closeModal(e){if(!e||e.target===e.currentTarget)document.getElementById('modalArea').innerHTML='';}
function markFromModal(word,known){state.known[word]=known;save();updateStats();toast(known?'✅ Đã thuộc!':'🔄 Bỏ đánh dấu',known);}

  const totalPages=Math.ceil(total/PER_PAGE)||1;
  if(state.page>totalPages)state.page=1;
  const start=(state.page-1)*PER_PAGE;
  const items=filtered.slice(start,start+PER_PAGE);
  const allGroups=[...new Set(VOCAB_ALL().map(v=>v.g))];

  let html=`
    <div class="controls">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Tìm từ vựng..." value="${state.search}" oninput="state.search=this.value;state.page=1;renderVocab()">
      </div>
      <select onchange="state.filterGroup=this.value;state.page=1;renderVocab()">
        <option value="all" ${state.filterGroup==='all'?'selected':''}>Tất cả nhóm</option>
        ${allGroups.map(g=>`<option value="${g}" ${state.filterGroup===g?'selected':''}>${g}</option>`).join('')}
      </select>
      <select onchange="state.filterStatus=this.value;state.page=1;renderVocab()">
        <option value="all" ${state.filterStatus==='all'?'selected':''}>Tất cả</option>

    </div>
    <div style="font-size:.82rem;color:var(--text2);font-weight:600;margin-bottom:.8rem">Hiển thị ${start+1}–${Math.min(start+PER_PAGE,total)} / ${total} từ · Nhấn từ để xem chi tiết</div>
    <div class="vocab-grid">`;

  items.forEach((item,i)=>{
    const isKnown=!!state.known[item.w];
    const families=item.f?item.f.split('|').map(s=>s.trim()).filter(Boolean):[];
    const expanded=!!state.expandedWords[item.w];
    const wEsc=item.w.replace(/'/g,"\\'");
    html+=`
      <div class="vocab-card ${isKnown?'known':''}">
        <div class="vocab-card-header" onclick="toggleExpand('${wEsc}')">
          <div class="word-num">${start+i+1}</div>
          <div class="word-main">
            <div class="word-en">
              ${item.w}
              <button class="speak-btn" onclick="speak('${wEsc}',event)" title="Nghe phát âm">🔊</button>
            </div>
            <div class="word-vi">${item.v}</div>
          </div>
          <span class="group-badge">${item.g}</span>
          <button class="known-btn ${isKnown?'active':''}" onclick="event.stopPropagation();toggleKnown('${wEsc}')">${isKnown?'✓ Thuộc':'+ Thuộc'}</button>
          <button class="expand-btn" title="Xem chi tiết">${expanded?'▲':'▼'}</button>
        </div>
        <div class="vocab-detail ${expanded?'open':''}">
          ${families.length?`
            <div class="family-section">
              <div class="family-label">📝 Gia đình từ</div>
              <div class="family-words">
                ${families.map(f=>{const sid='fm_'+f.replace(/[^a-zA-Z0-9]/g,'_');return `<div class="family-tag"><div class="family-tag-row"><button class="speak-mini" onclick="speak('${f.replace(/'/g,"\\'")}',event)">🔊</button><span class="family-tag-word">${f}</span></div><div class="family-tag-meaning" id="${sid}"><span style="opacity:.4;font-size:.7rem">đang tra...</span></div></div>`;}).join('')}
              </div>
            </div>`:'<div style="color:var(--text2);font-size:.85rem">Không có gia đình từ</div>'}
          <div style="margin-top:.8rem;display:flex;gap:6px;flex-wrap:wrap">
            <button class="btn btn-outline btn-sm" onclick="openWordModal('${wEsc}')">📖 Chi tiết</button>
          </div>
        </div>
      </div>`;
  });
  html+='</div>';

  if(totalPages>1){
    html+='<div class="pagination">';
    if(state.page>1)html+=`<button class="page-btn" onclick="state.page=${state.page-1};renderVocab()">‹</button>`;
    const s2=Math.max(1,state.page-2),e2=Math.min(totalPages,state.page+2);
    if(s2>1)html+=`<button class="page-btn" onclick="state.page=1;renderVocab()">1</button>`;
    if(s2>2)html+=`<span class="page-info">…</span>`;
    for(let p=s2;p<=e2;p++)html+=`<button class="page-btn ${p===state.page?'active':''}" onclick="state.page=${p};renderVocab()">${p}</button>`;
    if(e2<totalPages-1)html+=`<span class="page-info">…</span>`;
    if(e2<totalPages)html+=`<button class="page-btn" onclick="state.page=${totalPages};renderVocab()">${totalPages}</button>`;
    if(state.page<totalPages)html+=`<button class="page-btn" onclick="state.page=${state.page+1};renderVocab()">›</button>`;
    html+='</div>';
  }
  document.getElementById('tabContent').innerHTML=html;
}

const meaningCache={};

async function lookupMeaning(word){
  const key=word.toLowerCase().trim();
  if(meaningCache[key]!==undefined)return meaningCache[key];
  meaningCache[key]='';
  try{
    const r=await fetch('https://api.dictionaryapi.dev/api/v2/entries/en/'+encodeURIComponent(key));
    if(!r.ok){meaningCache[key]='';return '';}
    const d=await r.json();
    if(d&&d[0]&&d[0].meanings&&d[0].meanings[0]&&d[0].meanings[0].definitions&&d[0].meanings[0].definitions[0]){
      const pos=d[0].meanings[0].partOfSpeech||'';
      const def=d[0].meanings[0].definitions[0].definition||'';
      meaningCache[key]=`(${pos}) ${def}`.slice(0,80)+(def.length>80?'…':'');
    }
  }catch(e){meaningCache[key]='';}
  return meaningCache[key];
}

async function loadFamilyMeanings(families){
  for(const f of families){
    const sid='fm_'+f.replace(/[^a-zA-Z0-9]/g,'_');
    const el=document.getElementById(sid);
    if(!el)continue;
    const meaning=await lookupMeaning(f.split(' ')[0]);
    if(el){
      if(meaning){el.innerHTML=`<span style="color:var(--text2)">${meaning}</span>`;}
      else{el.innerHTML='';}
    }
  }
}

function toggleExpand(word){
  state.expandedWords[word]=!state.expandedWords[word];
  renderVocab();
  if(state.expandedWords[word]){
    const item=VOCAB_ALL().find(v=>v.w===word);
    if(item&&item.f){
      const families=item.f.split('|').map(s=>s.trim()).filter(Boolean);
      if(families.length)loadFamilyMeanings(families);
    }
  }
}
function toggleKnown(word){
  state.known[word]=!state.known[word];
  save();updateStats();renderVocab();
  toast(state.known[word]?'✅ Đã thuộc!':'🔄 Bỏ đánh dấu',state.known[word]);
}

}
function flipCard(){state.fcFlipped=!state.fcFlipped;renderFlashcard();}
function fcNav(dir){state.fcFlipped=false;state.fcIndex=(state.fcIndex+dir+state.fcDeck.length)%state.fcDeck.length;renderFlashcard();}
function fcMark(known){const w=state.fcDeck[state.fcIndex].w;state.known[w]=known;save();updateStats();toast(known?'✅ Thuộc!':'🔄 Tiếp tục học',known);fcNav(1);}
function shuffleDeck(){state.fcDeck=shuffle(state.fcDeck);state.fcIndex=0;state.fcFlipped=false;renderFlashcard();toast('🔀 Đã xáo bài!');}
function fcFilter(f){
  const va=VOCAB_ALL();
  if(f==='all')state.fcDeck=shuffle(va);
  else if(f==='unknown')state.fcDeck=shuffle(va.filter(v=>!state.known[v.w]));
  else state.fcDeck=shuffle(va.filter(v=>state.known[v.w]));
  state.fcIndex=0;state.fcFlipped=false;renderFlashcard();toast(`🃏 ${state.fcDeck.length} từ`);
}
function fcFilterGroup(g){
  const va=VOCAB_ALL();
  state.fcDeck=shuffle(g==='all'?va:va.filter(v=>v.g===g));
  state.fcIndex=0;state.fcFlipped=false;renderFlashcard();toast(`🃏 ${state.fcDeck.length} từ`);
}

      <div class="quiz-wrap">

          </div>

      </div>`;
    return;
  }
  const q=questions[current];
  const progress=Math.round((current/questions.length)*100);

    <div class="quiz-wrap">
      <div class="quiz-header">
        <div class="fc-progress" style="flex:1"><div class="fc-bar" style="width:${progress}%"></div></div>

          return `<button class="${cls}" onclick="answerQuiz('${opt.replace(/'/g,"\\'")}')" ${state.quizAnswered?'disabled':''}>${opt}</button>`;
        }).join('')}
      </div>
      <div class="quiz-feedback ${state.quizAnswered?(state.quizSelected===q.answer?'correct':'wrong'):''}">
        ${state.quizAnswered?(state.quizSelected===q.answer?'🎉 Đúng rồi!':'❌ Sai! Đáp án: '+q.answer):''}
      </div>
      ${state.quizAnswered?`<div style="text-align:center"><button class="btn btn-pink" onclick="nextQuestion()">Tiếp theo ▶</button></div>`:''}
    </div>`;

function startQuiz(mode,count){
  const va=VOCAB_ALL();
  let pool;
  if(mode==='all')pool=shuffle(va);
  else if(mode==='unknown')pool=shuffle(va.filter(v=>!state.known[v.w]));
  else pool=shuffle(va.filter(v=>v.g===mode));
  if(!pool.length){toast('Không có từ nào!');return;}
  pool=pool.slice(0,count);
  const questions=pool.map(item=>{
    const type=Math.random()>.5?'en2vi':'vi2en';
    const wrongPool=va.filter(v=>v.w!==item.w);
    const wrongs=shuffle(wrongPool).slice(0,3).map(v=>type==='en2vi'?v.v:v.w);
    const answer=type==='en2vi'?item.v:item.w;
    return {word:item.w,meaning:item.v,group:item.g,type,answer,options:shuffle([answer,...wrongs])};
  });
  state.quizState={questions,current:0,answers:[],done:false,correctCount:0};
  state.quizAnswered=false;state.quizSelected=null;
  renderQuiz();
}
function answerQuiz(opt){
  if(state.quizAnswered)return;
  state.quizAnswered=true;state.quizSelected=opt;
  const q=state.quizState.questions[state.quizState.current];
  if(opt===q.answer)state.quizState.correctCount=(state.quizState.correctCount||0)+1;
  state.quizState.answers.push({question:q,selected:opt,correct:opt===q.answer});
  renderQuiz();
}
function nextQuestion(){
  state.quizState.current++;state.quizAnswered=false;state.quizSelected=null;
  if(state.quizState.current>=state.quizState.questions.length){
    state.quizState.done=true;
    const h={score:state.quizState.correctCount,total:state.quizState.questions.length,time:new Date().toLocaleString('vi')};
    state.quizHistory.push(h);if(state.quizHistory.length>20)state.quizHistory=state.quizHistory.slice(-20);
    save();updateStats();
  }
  renderQuiz();
}
function reviewWrong(){
  const wrong=state.quizState.answers.filter(a=>!a.correct);
  if(!wrong.length){toast('Không có câu sai! 🎉',true);return;}
  const va=VOCAB_ALL();
  const questions=wrong.map(a=>{
    const q=a.question;
    const wrongPool=va.filter(v=>v.w!==q.word);
    const wrongs=shuffle(wrongPool).slice(0,3).map(v=>q.type==='en2vi'?v.v:v.w);
    return {...q,options:shuffle([q.answer,...wrongs])};
  });
  state.quizState={questions,current:0,answers:[],done:false,correctCount:0};
  state.quizAnswered=false;state.quizSelected=null;
  toast(`📝 Ôn ${questions.length} câu sai`);renderQuiz();
}

// --- DICTATION ---
function startDictation(mode){
  const va=VOCAB_ALL();
  let pool;
  if(mode==='all')pool=shuffle(va);
  else pool=shuffle(va.filter(v=>!state.known[v.w]));
  pool=pool.slice(0,15);
  state.dictState={pool,index:0,score:0,lives:3,answered:false,showHint:false};
  renderDictation();
}
function renderDictation(){
  if(!state.dictState){
    document.getElementById('tabContent').innerHTML=`
      <div class="dictation-wrap">
        <div style="text-align:center;padding:1.5rem;background:white;border-radius:20px;border:2px solid var(--border);margin-bottom:1rem">
          <div style="font-size:2.5rem;margin-bottom:.5rem">✍️</div>
          <h2 style="margin-bottom:.3rem">Chính tả</h2>
          <p style="color:var(--text2);font-size:.88rem;margin-bottom:1rem">Nghe phát âm → gõ lại từ tiếng Anh</p>
          <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
            <button class="btn btn-pink" onclick="startDictation('all')">🎯 15 từ ngẫu nhiên</button>
            <button class="btn btn-outline" onclick="startDictation('unknown')">📖 Từ chưa thuộc</button>
          </div>
        </div>
        <div style="text-align:center"><button class="btn btn-outline" onclick="state.gameMode=null;renderGame()">← Quay lại</button></div>
      </div>`;
    return;
  }
  const ds=state.dictState;
  if(ds.index>=ds.pool.length||ds.lives<=0){
    const total=ds.pool.length>ds.index?ds.index:ds.pool.length;
    document.getElementById('tabContent').innerHTML=`
      <div class="dictation-wrap">
        <div class="quiz-finish">
          <div style="font-size:3.5rem">${ds.lives<=0?'💔':'🎉'}</div>
          <div class="quiz-big">${ds.score}/${Math.min(ds.index,ds.pool.length)}</div>
          <p style="color:var(--text2);margin:.5rem 0 1rem">${ds.lives<=0?'Hết mạng rồi!':'Hoàn thành!'} Điểm: ${ds.score}</p>
          <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
            <button class="btn btn-pink" onclick="state.dictState=null;renderDictation()">🔄 Chơi lại</button>
            <button class="btn btn-outline" onclick="state.gameMode=null;state.dictState=null;renderGame()">← Chọn game</button>
          </div>
        </div>
      </div>`;
    return;
  }
  const item=ds.pool[ds.index];
  const blanks=item.w.split('').map(c=>c===' '?'&nbsp;&nbsp;':'_').join(' ');
  const hearts='❤️'.repeat(ds.lives)+'🖤'.repeat(3-ds.lives);
  document.getElementById('tabContent').innerHTML=`
    <div class="dictation-wrap">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:8px">
        <button class="btn btn-outline btn-sm" onclick="state.gameMode=null;state.dictState=null;renderGame()">← Quay lại</button>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <span class="quiz-score-pill">❤️ ${hearts}</span>
          <span class="quiz-score-pill">⭐ ${ds.score} điểm</span>
          <span class="quiz-score-pill">📍 ${ds.index+1}/${ds.pool.length}</span>
        </div>
      </div>
      <div class="dict-word-display">
        <div class="dict-hint">Nghe và gõ lại từ tiếng Anh</div>
        <div class="dict-blanks">${ds.answered?item.w:blanks}</div>
        <div class="dict-meaning">${item.v}</div>
        <div class="dict-group">${item.g}</div>
        ${ds.showHint?`<div class="hint-letters" style="margin-top:.8rem">${item.w.toUpperCase().split('').map(c=>`<span class="hint-letter">${c}</span>`).join('')}</div>`:''}
      </div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:1rem">
        <button class="btn btn-pink" onclick="speakDictWord()">🔊 Nghe từ</button>
        ${!ds.answered&&!ds.showHint?`<button class="btn btn-outline btn-sm" onclick="showDictHint()">💡 Gợi ý chữ cái</button>`:''}
      </div>
      ${!ds.answered?`
        <div class="dict-input-row">
          <input type="text" class="dict-input" id="dictInput" placeholder="Gõ từ tiếng Anh..." autocomplete="off" autocorrect="off" spellcheck="false"
            onkeydown="if(event.key==='Enter')checkDictation()">
          <button class="btn btn-pink" onclick="checkDictation()">✓ Kiểm tra</button>
        </div>
        <div class="dict-feedback" id="dictFeedback"></div>`:`
        <div style="text-align:center">
          <button class="btn btn-pink" onclick="nextDictWord()">Từ tiếp theo ▶</button>
        </div>`}
    </div>`;
  if(!ds.answered)setTimeout(()=>{const el=document.getElementById('dictInput');if(el)el.focus();},100);
}
function speakDictWord(){if(state.dictState)speak(state.dictState.pool[state.dictState.index].w);}
function showDictHint(){if(state.dictState){state.dictState.showHint=true;renderDictation();}}
function checkDictation(){
  const inp=document.getElementById('dictInput');if(!inp)return;
  const answer=inp.value.trim();
  const correct=state.dictState.pool[state.dictState.index];
  const isCorrect=answer.toLowerCase()===correct.w.toLowerCase();
  const fb=document.getElementById('dictFeedback');
  if(isCorrect){
    inp.classList.add('correct-input');
    if(fb){fb.textContent='🎉 Đúng rồi! +10 điểm';fb.className='dict-feedback ok';}
    state.dictState.score+=state.dictState.showHint?5:10;
    state.dictState.answered=true;
    setTimeout(()=>renderDictation(),900);
  } else {
    inp.classList.add('wrong-input');
    if(fb){fb.textContent='❌ Sai! Thử lại…';fb.className='dict-feedback bad';}
    state.dictState.lives--;
    if(state.dictState.lives<=0){state.dictState.answered=true;setTimeout(()=>renderDictation(),800);}
    else{setTimeout(()=>{inp.classList.remove('wrong-input');inp.value='';if(fb)fb.textContent='';},600);}
  }
}
function nextDictWord(){if(state.dictState){state.dictState.index++;state.dictState.answered=false;state.dictState.showHint=false;renderDictation();}}

}

      </div>
      <p style="text-align:center;font-size:.85rem;color:var(--text2);margin-bottom:.8rem">Chọn từ tiếng Anh rồi chọn nghĩa tương ứng 🔗</p>
      <div class="match-grid">
        <div class="match-col">
          ${ms.eng.map(c=>`
            <div class="match-card ${ms.matched.includes(c.id)?'matched':''} ${ms.selected&&ms.selected.id===c.id&&ms.selected.type==='en'?'selected':''} ${c._wrongFlash?'wrong-flash':''}"
              onclick="selectMatchCard('${c.id}','en')">${c.text}
              <button style="background:none;border:none;cursor:pointer;font-size:.9rem;margin-left:4px" onclick="event.stopPropagation();speak('${c.id.replace(/'/g,"\\'")}',event)">🔊</button>
            </div>`).join('')}
        </div>
        <div class="match-col">
          ${ms.viet.map(c=>`
            <div class="match-card ${ms.matched.includes(c.id)?'matched':''} ${ms.selected&&ms.selected.id===c.id&&ms.selected.type==='vi'?'selected':''} ${c._wrongFlash?'wrong-flash':''}"
              onclick="selectMatchCard('${c.id}','vi')">${c.text}
            </div>`).join('')}
        </div>
      </div>
    </div>`;
  setTimeout(()=>{const t=Math.round((Date.now()-ms.startTime)/1000);const el=document.querySelector('.match-timer');if(el)el.textContent=`⏱ ${t}s`;},1000);
}
function selectMatchCard(id,type){
  const ms=state.matchState;if(!ms)return;
  if(ms.matched.includes(id))return;
  const prev=ms.selected;
  if(!prev){ms.selected={id,type};renderMatch();return;}
  if(prev.type===type){ms.selected={id,type};renderMatch();return;}
  if(prev.id===id){
    ms.matched.push(id);ms.selected=null;
    speak(id);
    if(ms.matched.length>=6){setTimeout(()=>{ms.done=true;renderMatch();},400);}
    else renderMatch();
  } else {
    ms.errors++;
    const prevArr=prev.type==='en'?ms.eng:ms.viet;
    const currArr=type==='en'?ms.eng:ms.viet;
    const prevCard=prevArr.find(c=>c.id===prev.id);
    const currCard=currArr.find(c=>c.id===id);
    if(prevCard)prevCard._wrongFlash=true;
    if(currCard)currCard._wrongFlash=true;
    ms.selected=null;
    renderMatch();
    setTimeout(()=>{
      if(prevCard)delete prevCard._wrongFlash;
      if(currCard)delete currCard._wrongFlash;
      renderMatch();
    },500);
  }
}

// ============ ADD VOCAB TAB ============

      <div class="add-tabs">
        <button class="add-tab ${state.addSubTab==='manual'?'active':''}" onclick="state.addSubTab='manual';renderAddVocab()">✏️ Gõ thủ công</button>
        <button class="add-tab ${state.addSubTab==='upload'?'active':''}" onclick="state.addSubTab='upload';renderAddVocab()">📤 Upload Excel</button>
        <button class="add-tab ${state.addSubTab==='list'?'active':''}" onclick="state.addSubTab='list';renderAddVocab()">📋 Từ đã thêm (${customVocab.length})</button>
      </div>

      ${state.addSubTab==='manual'?`
        <div style="background:white;border-radius:var(--radius);border:1.5px solid var(--border);padding:1.2rem;margin-bottom:1rem">
          <h3 style="margin-bottom:1rem;font-size:1rem">Nhập từ mới</h3>
          <div class="form-row">
            <div class="form-group">

              <label>Nghĩa tiếng Việt *</label>
              <input class="form-input" id="newViet" placeholder="vd: Phong phú, dồi dào">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Gia đình từ (ngăn cách bằng |)</label>
              <input class="form-input" id="newFamily" placeholder="vd: abundantly | abundance">
            </div>
            <div class="form-group">
              <label>Nhóm</label>
              <select class="form-input" id="newGroup">
                ${allGroups.map(g=>`<option value="${g}">${g}</option>`).join('')}
                <option value="Từ tự thêm">Từ tự thêm</option>
              </select>
            </div>
          </div>
          <button class="btn btn-pink" onclick="addManualWord()">➕ Thêm từ này</button>
        </div>`:''}

      ${state.addSubTab==='upload'?`
        <div style="background:white;border-radius:var(--radius);border:1.5px solid var(--border);padding:1.2rem">
          <h3 style="margin-bottom:.5rem;font-size:1rem">Upload file Excel (.xlsx)</h3>
          <p style="font-size:.83rem;color:var(--text2);margin-bottom:1rem">File cần có các cột: <strong>Từ vựng (Tiếng Anh)</strong>, <strong>Nghĩa (Tiếng Việt)</strong>, <strong>Gia đình từ</strong> (không bắt buộc), <strong>Nhóm</strong> (không bắt buộc)</p>
          <div class="upload-zone" onclick="document.getElementById('xlsxFile').click()">
            <div class="uz-icon">📂</div>
            <div class="uz-text">Nhấn để chọn file Excel</div>
            <div class="uz-sub">.xlsx, .xls — tối đa 5MB</div>
          </div>
          <input type="file" id="xlsxFile" accept=".xlsx,.xls" style="display:none" onchange="handleExcelUpload(event)">
          <div id="previewArea"></div>
        </div>`:''}

      ${state.addSubTab==='list'?`
        <div>
          ${customVocab.length===0?`
            <div class="empty"><div class="eicon">📭</div><p>Chưa có từ nào được thêm.<br>Thêm từ bằng tab bên trên nhé!</p></div>`:`
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.8rem;flex-wrap:wrap;gap:8px">
              <span style="font-size:.88rem;color:var(--text2);font-weight:600">${customVocab.length} từ đã thêm</span>
              <button class="btn btn-red btn-sm" onclick="if(confirm('Xóa hết từ tự thêm?')){customVocab=[];save();updateStats();toast('🗑️ Đã xóa hết');renderAddVocab();}">🗑️ Xóa tất cả</button>
            </div>
            <div class="custom-list">
              ${customVocab.map((v,i)=>`
                <div class="custom-item">
                  <div class="ci-word">
                    ${v.w}

function addManualWord(){
  const w=document.getElementById('newWord').value.trim();
  const v=document.getElementById('newViet').value.trim();
  const f=document.getElementById('newFamily').value.trim();
  const g=document.getElementById('newGroup').value;
  if(!w||!v){toast('⚠️ Điền đủ từ và nghĩa nhé!');return;}
  customVocab.push({w,v,f,g});save();updateStats();
  document.getElementById('newWord').value='';document.getElementById('newViet').value='';document.getElementById('newFamily').value='';
  toast('✅ Đã thêm: '+w,true);renderAddVocab();
}
function deleteCustomWord(i){customVocab.splice(i,1);save();updateStats();toast('🗑️ Đã xóa');renderAddVocab();}

function handleExcelUpload(event){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      if(rows.length<2){toast('File không có dữ liệu!');return;}
      const header=rows[0].map(h=>(h||'').toString().trim().toLowerCase());
      const colEn=header.findIndex(h=>h.includes('tiếng anh')||h.includes('english')||h.includes('từ vựng'));
      const colVi=header.findIndex(h=>h.includes('tiếng việt')||h.includes('nghĩa')||h.includes('vietnam'));
      const colFam=header.findIndex(h=>h.includes('gia đình')||h.includes('family'));
      const colGr=header.findIndex(h=>h.includes('nhóm')||h.includes('group'));
      if(colEn<0||colVi<0){toast('❌ Không tìm thấy cột "Từ vựng (Tiếng Anh)" hoặc "Nghĩa (Tiếng Việt)"!');return;}
      const preview=rows.slice(1).filter(r=>r[colEn]&&r[colVi]).slice(0,50);
      document.getElementById('previewArea').innerHTML=`
        <div style="margin-top:1rem">
          <h3 style="font-size:.95rem;margin-bottom:.5rem">👀 Preview (${preview.length} từ)</h3>
          <table class="preview-table">
            <thead><tr><th>Từ tiếng Anh</th><th>Nghĩa</th><th>Gia đình từ</th><th>Nhóm</th></tr></thead>
            <tbody>${preview.slice(0,10).map(r=>`<tr><td><b>${r[colEn]}</b></td><td>${r[colVi]}</td><td style="font-size:.75rem">${colFam>=0?r[colFam]:''}</td><td>${colGr>=0?r[colGr]:'Từ upload'}</td></tr>`).join('')}</tbody>
          </table>
          ${preview.length>10?`<p style="font-size:.8rem;color:var(--text2);margin-top:.4rem">...và ${preview.length-10} từ nữa</p>`:''}
          <button class="btn btn-pink" style="margin-top:1rem" onclick="importExcelData(${JSON.stringify(preview.map(r=>({w:(r[colEn]||'').toString().trim(),v:(r[colVi]||'').toString().trim(),f:colFam>=0?(r[colFam]||'').toString().trim():'',g:colGr>=0?(r[colGr]||'Từ upload').toString().trim():'Từ upload'})))})">📥 Import ${preview.length} từ này</button>
        </div>`;
    }catch(err){toast('❌ Lỗi đọc file: '+err.message);}
  };
  reader.readAsArrayBuffer(file);
}
function importExcelData(data){
  let added=0;
  data.forEach(item=>{if(item.w&&item.v){customVocab.push(item);added++;}});
  save();updateStats();toast(`✅ Đã import ${added} từ!`,true);state.addSubTab='list';renderAddVocab();
}

// ============ SCOREBOARD ============
function renderScore(){
  const va=VOCAB_ALL();
  const known=Object.values(state.known).filter(Boolean).length;
  const unknown=va.length-known;
  const pct=Math.round(known/va.length*100);
  const allGroups=[...new Set(va.map(v=>v.g))];
  const groupStats=allGroups.map(g=>{const all=va.filter(v=>v.g===g);const k=all.filter(v=>state.known[v.w]).length;return {g,total:all.length,known:k,pct:Math.round(k/all.length*100)};});
  const totalCorrect=state.quizHistory.reduce((a,h)=>a+h.score,0);
  const totalQ=state.quizHistory.reduce((a,h)=>a+h.total,0);
  const avgPct=totalQ?Math.round(totalCorrect/totalQ*100):0;
  const svgR=52,cx=65,cy=65,circ=2*Math.PI*svgR,dash=circ*(pct/100);
  document.getElementById('tabContent').innerHTML=`
    <div class="score-wrap">
      <div class="score-summary">
        <div class="score-card"><div class="num">${va.length}</div><div class="lbl">📚 Tổng từ</div></div>
        <div class="score-card green"><div class="num">${known}</div><div class="lbl">✅ Đã thuộc</div></div>
        <div class="score-card"><div class="num">${unknown}</div><div class="lbl">📖 Chưa thuộc</div></div>
        <div class="score-card yellow"><div class="num">${avgPct}%</div><div class="lbl">⚡ Quiz TB</div></div>
      </div>
      <div class="progress-ring-wrap">
        <svg width="130" height="130" viewBox="0 0 130 130">
          <circle cx="${cx}" cy="${cy}" r="${svgR}" fill="none" stroke="#ffd6e7" stroke-width="12"/>
          <circle cx="${cx}" cy="${cy}" r="${svgR}" fill="none" stroke="#ff8fab" stroke-width="12"
            stroke-dasharray="${dash} ${circ}" stroke-dashoffset="${circ/4}"
            stroke-linecap="round" transform="rotate(-90 ${cx} ${cy})"/>
          <text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="middle" font-size="22" font-weight="700" fill="#e8547a" font-family="Quicksand,sans-serif">${pct}%</text>
        </svg>
        <div class="progress-label">Tiến độ học tập</div>
      </div>
      <h3 style="margin-bottom:.8rem">📊 Theo từng nhóm</h3>
      <div class="score-groups">
        ${groupStats.map(gs=>`
          <div class="score-group-card">
            <div class="sg-name">${gs.g}</div>
            <div class="sg-bar-wrap"><div class="sg-bar" style="width:${gs.pct}%"></div></div>
            <div class="sg-info">${gs.known}/${gs.total} từ · ${gs.pct}%</div>
          </div>`).join('')}
      </div>
      ${state.quizHistory.length?`
        <h3 style="margin:1.5rem 0 .8rem">📋 Lịch sử quiz</h3>
        <div class="history-list">
          ${state.quizHistory.slice().reverse().map(h=>`
            <div class="history-item">
              <div>🎯 ${h.score}/${h.total}</div>
              <div style="font-weight:700;color:${h.score/h.total>=.7?'var(--green)':'var(--orange)'}">${Math.round(h.score/h.total*100)}%</div>
              <div class="ts">${h.time}</div>
            </div>`).join('')}
        </div>`:`<div class="empty"><div class="eicon">🎮</div><p>Chưa có lịch sử quiz.</p></div>`}
      <div style="text-align:center;margin-top:1.5rem">
        <button class="btn btn-outline btn-sm" onclick="if(confirm('Reset tất cả dữ liệu?')){state.known={};state.quizHistory=[];customVocab=[];save();updateStats();renderScore();}">🗑️ Reset tất cả</button>
      </div>
    </div>`;
}

function switchTab(tab){
  state.tab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
  state.quizAnswered=false;
  if(tab==='vocab')renderVocab();
  else if(tab==='flashcard')renderFlashcard();
  else if(tab==='quiz')renderQuiz();
  else if(tab==='game')renderGame();
  else if(tab==='addvocab')renderAddVocab();
  else renderScore();
}

document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>switchTab(t.dataset.tab)));
updateStats();
renderVocab();
</script>
